################################################################################
# This file contains all keywords recognized by BAPCtools                      #
# the keywords are organized in a tree like fashion (represented by maps,      #
# lists and strings)                                                           #
# Notes:                                                                       #
# - the root keys are not considered as keywords                               #
# - the same keyword may appear in multiple places                             #
# - leaves of the tree are allowed to be NULL                                  #
################################################################################
# synonyms are treated special, and are used to... resolve synonyms
# Notes:
# - synonyms must be a mapping from string to string
# - all entries are still parsed as keywords
# - it is undefined behaviour if the synonyms form cycles
synonyms:
  breadth-first search: bfs
  communication: multi-pass
  crt: chinese remainder theorem
  depth-first search: dfs
  disjoint set union: dsu
  dynamic programming: dp
  fast fourier transform: fft
  greatest common divisor: gcd
  least common multiple: lcm
  longest common subsequence: lcs
  longest increasing subsequence: lis
  lowest common ancestor: lca
  number theoretic transform: ntt
  output-only: submit-answer
  run-twice: multi-pass
  two pointers: sliding window
  union find: dsu

problem types:
  - interactive
  - multi-pass
  - pass-fail
  - scoring
  - submit-answer

misc:
  - casework
  - implementation
  - simulation

techniques:
  - ad-hoc
  - binary search
  - bitmask
  - brute force
  - constructive
  - divide and conquer
  - dp
  - greedy
  - hashing
  - meet-in-the-middle
  - randomized
  - sliding window
  - sorting
  - sqrt decomposition
  - sweep line
  - ternary search

