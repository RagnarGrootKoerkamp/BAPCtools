    - graph theory:
    - matching:
      - bipartite matching
      - general matching
      - weighted matching
    - topological sorting:
    - trees:
      - centroid decomposition
      - heavy-light decomposition
      - lca
      - spanning tree
    - shortest path:
      - bellman-ford
      - dijkstra
      - floyd-warshall
  - math:
    - big integer:
    - combinatorics:
      - generating functions
      - inclusion-exclusion
      - inversions
      - permutations
      - probabilities
    - game theory:
      - nimbers
    - linear algebra:
